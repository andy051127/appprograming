<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>레시피 추천</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🍳 레시피 추천</h1>
      <p class="subtitle">보유 재료로 만들 수 있는 요리를 추천해드립니다</p>
    </header>

    <!-- 보유 재료 요약 -->
    <section class="ingredient-summary">
      <h2>보유 재료</h2>
      <div id="ingredientTags" class="ingredient-tags"></div>
      <button id="getRecipesBtn" class="btn-primary">🔍 레시피 추천받기</button>
    </section>

    <!-- 오류 메시지 -->
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <!-- 로딩 -->
    <div id="loading" class="loading" style="display:none;">
      <div class="spinner"></div>
      <p>AI가 레시피를 추천하고 있습니다...</p>
    </div>

    <!-- 레시피 카드 목록 -->
    <section id="recipesSection" style="display:none;">
      <h2 class="section-title">추천 레시피</h2>
      <div id="recipeCards" class="recipe-cards"></div>
    </section>

    <!-- 조리법 상세 모달 -->
    <div id="detailModal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="detailTitle"></h2>
          <button id="closeModal" class="close-btn">✕</button>
        </div>

        <div id="detailLoading" class="loading" style="display:none;">
          <div class="spinner"></div>
          <p>조리법을 불러오는 중...</p>
        </div>

        <div id="detailBody">
          <ol id="stepsList" class="steps-list"></ol>
          <div id="tipsBox" class="tips-box" style="display:none;">
            <span class="tips-icon">💡</span>
            <p id="tipsText"></p>
          </div>
        </div>

        <!-- Step 3 즐겨찾기 버튼 (연동 예정) -->
        <button id="favoriteBtn" class="btn-favorite">⭐ 즐겨찾기 추가</button>
      </div>
    </div>
    <div id="modalOverlay" class="modal-overlay" style="display:none;"></div>

    <!-- 토스트 알림 -->
    <div id="toast" class="toast" style="display:none;"></div>

    <!-- 뒤로가기 -->
    <a href="/" class="back-link">← 재료 다시 인식하기</a>
  </div>

  <script src="/static/recipes.js"></script>
</body>
</html>
