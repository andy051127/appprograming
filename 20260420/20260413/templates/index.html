<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냉장고 재료 인식</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🧊 냉장고 재료 인식 & 레시피 추천</h1>
      <p class="subtitle">냉장고 사진을 업로드하면 AI가 재료를 인식해드립니다</p>
    </header>

    <!-- 이미지 업로드 영역 -->
    <section class="upload-section">
      <div id="dropzone" class="dropzone">
        <div id="dropzone-content">
          <span class="upload-icon">📷</span>
          <p>이미지를 드래그하거나 클릭해서 업로드</p>
          <p class="hint">JPG, PNG, WEBP · 최대 10MB</p>
        </div>
        <img id="preview" src="" alt="미리보기" style="display:none;" />
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden />
      </div>

      <button id="analyzeBtn" class="btn-primary" disabled>
        🔍 재료 분석하기
      </button>
    </section>

    <!-- 오류 메시지 -->
    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <!-- 로딩 -->
    <div id="loading" class="loading" style="display:none;">
      <div class="spinner"></div>
      <p>AI가 재료를 분석하고 있습니다...</p>
    </div>

    <!-- 재료 목록 -->
    <section id="ingredientSection" class="ingredient-section" style="display:none;">
      <h2>인식된 재료 목록</h2>
      <ul id="ingredientList" class="ingredient-list"></ul>

      <div class="add-ingredient">
        <input type="text" id="newIngredient" placeholder="재료 직접 추가..." />
        <button id="addBtn" class="btn-secondary">+ 추가</button>
      </div>

      <button id="nextBtn" class="btn-primary" style="margin-top:20px; width:100%;">
        레시피 추천받기 →
      </button>
    </section>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
