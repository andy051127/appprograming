<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>즐겨찾기 레시피</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>⭐ 저장된 레시피</h1>
      <p class="subtitle">즐겨찾기에 저장한 레시피 목록입니다</p>
    </header>

    <!-- 검색 -->
    <div class="fav-search-box">
      <input type="text" id="searchInput" placeholder="🔍 레시피 이름 검색..." />
    </div>

    <!-- 목록 -->
    <div id="favList" class="fav-list"></div>

    <!-- 빈 상태 -->
    <div id="emptyState" class="empty-state" style="display:none;">
      <p>저장된 레시피가 없습니다.</p>
      <a href="/" class="btn-primary" style="display:inline-block; margin-top:16px; text-decoration:none; text-align:center;">
        냉장고 재료 인식하러 가기
      </a>
    </div>

    <!-- 조리법 모달 -->
    <div id="detailModal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="detailTitle"></h2>
          <button id="closeModal" class="close-btn">✕</button>
        </div>
        <div class="modal-meta" id="detailMeta"></div>
        <ol id="stepsList" class="steps-list"></ol>
        <div id="tipsBox" class="tips-box" style="display:none;">
          <span class="tips-icon">💡</span>
          <p id="tipsText"></p>
        </div>
      </div>
    </div>
    <div id="modalOverlay" class="modal-overlay" style="display:none;"></div>

    <!-- 토스트 -->
    <div id="toast" class="toast" style="display:none;"></div>

    <a href="/" class="back-link">← 재료 다시 인식하기</a>
  </div>

  <script src="/static/favorites.js"></script>
</body>
</html>
