<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앱프로그래밍응용 중간고사 대비 퀴즈</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-dark: #4338ca;
    --success: #16a34a;
    --error: #dc2626;
    --warning: #d97706;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: white; padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(79,70,229,.3);
  }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header small { font-size: .8rem; opacity: .85; display: block; margin-top: 2px; }
  #scoreBoard { background: rgba(255,255,255,.2); border-radius: 12px; padding: 8px 16px; text-align: center; font-size: .85rem; }
  #scoreBoard strong { font-size: 1.3rem; display: block; }

  /* ── Main ── */
  main { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

  /* ── Start Screen ── */
  #startScreen { text-align: center; padding: 40px 20px; }
  #startScreen h2 { font-size: 1.8rem; margin-bottom: 12px; color: var(--primary); }
  #startScreen p { color: var(--text-muted); margin-bottom: 32px; line-height: 1.7; }
  .weekGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .weekCard {
    background: var(--card); border: 2px solid var(--border); border-radius: 12px;
    padding: 16px; cursor: pointer; transition: all .2s;
    text-align: left;
  }
  .weekCard:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79,70,229,.15); }
  .weekCard.selected { border-color: var(--primary); background: #eef2ff; }
  .weekCard .wNum { font-size: .75rem; color: var(--primary); font-weight: 600; text-transform: uppercase; }
  .weekCard .wTitle { font-size: .95rem; font-weight: 600; margin: 4px 0; }
  .weekCard .wCount { font-size: .8rem; color: var(--text-muted); }
  .btnPrimary {
    background: var(--primary); color: white; border: none;
    padding: 14px 40px; border-radius: 10px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .btnPrimary:hover { background: var(--primary-dark); }
  .btnPrimary:disabled { background: #a5b4fc; cursor: not-allowed; }

  /* ── Quiz Screen ── */
  #quizScreen { display: none; }
  .progressWrap { margin-bottom: 20px; }
  .progressInfo { display: flex; justify-content: space-between; font-size: .85rem; color: var(--text-muted); margin-bottom: 6px; }
  .progressBar { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; }
  .progressFill { background: linear-gradient(90deg, var(--primary), #7c3aed); height: 100%; border-radius: 99px; transition: width .4s; }
  .weekBadge { display: inline-block; background: #eef2ff; color: var(--primary); font-size: .75rem; font-weight: 600; padding: 4px 10px; border-radius: 99px; margin-bottom: 16px; }

  .questionCard {
    background: var(--card); border-radius: 16px; padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 20px;
  }
  .questionCard .qNum { font-size: .8rem; color: var(--text-muted); margin-bottom: 8px; }
  .questionCard .qText { font-size: 1.05rem; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }
  .questionCard .qSubText { font-size: .9rem; color: var(--text-muted); background: #f8fafc; border-left: 3px solid var(--primary); padding: 10px 14px; border-radius: 0 8px 8px 0; margin-bottom: 16px; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg); border: 2px solid var(--border); border-radius: 10px;
    padding: 14px 16px; cursor: pointer; transition: all .15s;
    display: flex; align-items: flex-start; gap: 10px; font-size: .95rem; line-height: 1.5;
  }
  .option:hover:not(.disabled) { border-color: var(--primary); background: #eef2ff; }
  .option .optLabel { font-weight: 700; color: var(--text-muted); min-width: 20px; }
  .option.correct { border-color: var(--success); background: #f0fdf4; }
  .option.correct .optLabel { color: var(--success); }
  .option.wrong { border-color: var(--error); background: #fef2f2; }
  .option.wrong .optLabel { color: var(--error); }
  .option.show-correct { border-color: var(--success); background: #f0fdf4; }
  .option.show-correct .optLabel { color: var(--success); }
  .option.disabled { cursor: not-allowed; }

  /* Feedback */
  .feedback {
    margin-top: 16px; padding: 14px 16px; border-radius: 10px;
    font-size: .9rem; line-height: 1.6; display: none;
  }
  .feedback.correct { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
  .feedback.wrong { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }

  /* Text input question */
  .textInputWrap { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .textInputWrap input {
    flex: 1; min-width: 160px; border: 2px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: .95rem; outline: none; transition: border-color .2s;
  }
  .textInputWrap input:focus { border-color: var(--primary); }
  .textInputWrap input.correct-input { border-color: var(--success); background: #f0fdf4; }
  .textInputWrap input.wrong-input { border-color: var(--error); background: #fef2f2; }
  .btnCheck { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: .9rem; cursor: pointer; font-weight: 600; }
  .btnCheck:hover { background: var(--primary-dark); }

  /* Navigation */
  .navBtns { display: flex; gap: 10px; justify-content: flex-end; }
  .btnSecondary {
    background: var(--card); color: var(--text); border: 2px solid var(--border);
    padding: 11px 24px; border-radius: 10px; font-size: .95rem; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .btnSecondary:hover { border-color: var(--primary); color: var(--primary); }

  /* ── Result Screen ── */
  #resultScreen { display: none; text-align: center; }
  .resultCard { background: var(--card); border-radius: 20px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
  .resultEmoji { font-size: 4rem; margin-bottom: 16px; }
  .resultScore { font-size: 3.5rem; font-weight: 800; color: var(--primary); }
  .resultTotal { font-size: 1rem; color: var(--text-muted); margin-bottom: 24px; }
  .resultMsg { font-size: 1.1rem; margin-bottom: 32px; }
  .resultStats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .statBox { background: var(--bg); border-radius: 12px; padding: 16px; }
  .statBox .val { font-size: 1.6rem; font-weight: 700; }
  .statBox .lbl { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
  .statBox.green .val { color: var(--success); }
  .statBox.red .val { color: var(--error); }
  .statBox.blue .val { color: var(--primary); }
  .resultActions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* Review */
  #reviewSection { margin-top: 32px; }
  .reviewItem { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 12px; border-left: 4px solid var(--border); text-align: left; }
  .reviewItem.reviewCorrect { border-left-color: var(--success); }
  .reviewItem.reviewWrong { border-left-color: var(--error); }
  .reviewItem .revQ { font-size: .9rem; font-weight: 600; margin-bottom: 8px; }
  .reviewItem .revA { font-size: .85rem; color: var(--text-muted); }
  .reviewItem .revA span { font-weight: 600; }
  .reviewItem .revA .correct-ans { color: var(--success); }
  .reviewItem .revA .wrong-ans { color: var(--error); }

  @media (max-width: 500px) {
    header { flex-direction: column; gap: 12px; text-align: center; }
    .resultStats { grid-template-columns: 1fr; }
    .weekGrid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>앱프로그래밍응용 중간고사 퀴즈</h1>
    <small>신구대학교 컴퓨터소프트웨어학과 · 2026-1</small>
  </div>
  <div id="scoreBoard">
    <strong id="headerScore">0</strong>
    <span>점 획득</span>
  </div>
</header>

<main>
  <!-- ① Start -->
  <div id="startScreen">
    <h2>📚 시험 대비 퀴즈</h2>
    <p>1~7주차 강의 교재의 연습문제를 그대로 수록했습니다.<br>
       학습할 주차를 선택하거나 전체 문제를 풀어보세요!</p>
    <div class="weekGrid" id="weekGrid"></div>
    <button class="btnPrimary" id="startBtn">퀴즈 시작하기</button>
  </div>

  <!-- ② Quiz -->
  <div id="quizScreen">
    <div class="progressWrap">
      <div class="progressInfo">
        <span id="progressText">문제 1 / 1</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progressBar"><div class="progressFill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="questionCard" id="qCard">
      <div class="qNum" id="qNum"></div>
      <div class="weekBadge" id="qWeekBadge"></div>
      <div class="qText" id="qText"></div>
      <div class="qSubText" id="qSubText" style="display:none"></div>
      <div id="optionsArea"></div>
      <div class="feedback" id="feedbackBox"></div>
    </div>

    <div class="navBtns">
      <button class="btnSecondary" id="prevBtn" onclick="goPrev()">← 이전</button>
      <button class="btnPrimary" id="nextBtn" onclick="goNext()">다음 →</button>
    </div>
  </div>

  <!-- ③ Result -->
  <div id="resultScreen">
    <div class="resultCard">
      <div class="resultEmoji" id="resultEmoji"></div>
      <div class="resultScore" id="resultScore"></div>
      <div class="resultTotal" id="resultTotal"></div>
      <div class="resultMsg" id="resultMsg"></div>
      <div class="resultStats">
        <div class="statBox green"><div class="val" id="rCorrect"></div><div class="lbl">정답</div></div>
        <div class="statBox red"><div class="val" id="rWrong"></div><div class="lbl">오답</div></div>
        <div class="statBox blue"><div class="val" id="rPct"></div><div class="lbl">정답률</div></div>
      </div>
      <div class="resultActions">
        <button class="btnSecondary" onclick="showReview()">오답 복습하기</button>
        <button class="btnPrimary" onclick="location.reload()">처음으로</button>
      </div>
    </div>
    <div id="reviewSection"></div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════
//  QUESTION DATA
// ═══════════════════════════════════════════════════════
const ALL_QUESTIONS = [

// ─── 1주차 ───────────────────────────────────────────
{

},
{

  q: '빈칸을 채워 보세요.',
  sub: '바이브 코딩 도구는 여러 AI를 선택할 수 있는 (  ①  ) 도구와 자체 AI를 활용하는 (  ②  ) 도구로 나뉜다.',
  opts: [
    '① 모델 선택형, ② 전용 모델형',
    '① 전용 모델형, ② 모델 선택형',

    'LLM 기반 → 딥러닝 기반 → 통계 기반 → 규칙 기반'
  ],
  answer: 0,
  explain: '규칙 기반 → 통계 기반 → 딥러닝 기반 → LLM 기반 순서입니다.'

{
  week: 1, section: '01-2 나의 첫 웹페이지',

// ─── 3주차 ───────────────────────────────────────────

  q: '클로드 코드를 실행하기 위해 필수적으로 설치해야 하는 두 가지 프로그램을 고르세요.',

{

  opts: [

// ═══════════════════════════════════════════════════════
//  WEEK META
// ═══════════════════════════════════════════════════════
const WEEK_META = [
  { w:0, label:'전체', title:'모든 문제 (1~7주차)', color:'#4f46e5' },
  { w:1, label:'1주차', title:'바이브 코딩이란 / 첫 웹페이지', color:'#0ea5e9' },
  { w:2, label:'2주차', title:'효과적인 프롬프트 / 마케팅 포트폴리오', color:'#8b5cf6' },
  { w:3, label:'3주차', title:'클로드 코드 설치 / CLAUDE.md', color:'#ec4899' },
  { w:4, label:'4주차', title:'할 일 관리 앱 / 세션 관리', color:'#f59e0b' },
  { w:5, label:'5주차', title:'할루시네이션 / 커스텀 명령어', color:'#10b981' },
  { w:6, label:'6주차', title:'API 설정 / 냉장고를 부탁해', color:'#ef4444' },
  { w:7, label:'7주차', title:'서브에이전트 / MCP', color:'#6366f1' },
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let selectedWeeks = new Set([0]);
let currentQuestions = [];
let currentIdx = 0;
let userAnswers = [];
let score = 0;
let answered = false;

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init() {
  const grid = document.getElementById('weekGrid');
  WEEK_META.forEach(m => {
    const count = m.w === 0
      ? ALL_QUESTIONS.length
      : ALL_QUESTIONS.filter(q => q.week === m.w).length;
    const card = document.createElement('div');
    card.className = 'weekCard' + (m.w === 0 ? ' selected' : '');
    card.innerHTML = `<div class="wNum">${m.label}</div><div class="wTitle">${m.title}</div><div class="wCount">문제 ${count}개</div>`;
    card.onclick = () => toggleWeek(m.w, card);
    grid.appendChild(card);
  });
  document.getElementById('startBtn').onclick = startQuiz;
}

function toggleWeek(w, card) {
  if (w === 0) {
    // 전체 선택
    selectedWeeks.clear();
    selectedWeeks.add(0);
    document.querySelectorAll('.weekCard').forEach((c, i) => {
      c.classList.toggle('selected', i === 0);
    });
  } else {
    selectedWeeks.delete(0);
    document.querySelectorAll('.weekCard')[0].classList.remove('selected');
    if (selectedWeeks.has(w)) {
      selectedWeeks.delete(w);
      card.classList.remove('selected');
    } else {
      selectedWeeks.add(w);
      card.classList.add('selected');
    }
    if (selectedWeeks.size === 0) {
      selectedWeeks.add(0);
      document.querySelectorAll('.weekCard')[0].classList.add('selected');
    }
  }
}

function startQuiz() {
  if (selectedWeeks.has(0)) {
    currentQuestions = shuffle([...ALL_QUESTIONS]);
  } else {
    const pool = ALL_QUESTIONS.filter(q => selectedWeeks.has(q.week));
    currentQuestions = shuffle(pool);
  }
  if (currentQuestions.length === 0) return;

  userAnswers = new Array(currentQuestions.length).fill(null);
  currentIdx = 0;
  score = 0;

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestion();
}

// ═══════════════════════════════════════════════════════
//  SHUFFLE
// ═══════════════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ═══════════════════════════════════════════════════════
//  RENDER QUESTION
// ═══════════════════════════════════════════════════════
function renderQuestion() {
  const q = currentQuestions[currentIdx];
  const total = currentQuestions.length;
  answered = userAnswers[currentIdx] !== null;

  // Progress
  document.getElementById('progressText').textContent = `문제 ${currentIdx + 1} / ${total}`;
  const pct = Math.round(((currentIdx + 1) / total) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // Badge
  document.getElementById('qWeekBadge').textContent = `${q.week}주차 · ${q.section}`;

  // Question
  document.getElementById('qNum').textContent = `Q${currentIdx + 1}`;
  document.getElementById('qText').textContent = q.q;
  const subEl = document.getElementById('qSubText');
  if (q.sub) {
    subEl.textContent = q.sub;
    subEl.style.display = 'block';
  } else {
    subEl.style.display = 'none';
  }

  // Options
  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  const labels = ['①', '②', '③', '④', '⑤'];
  const div = document.createElement('div');
  div.className = 'options';

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'option';
    btn.innerHTML = `<span class="optLabel">${labels[i]}</span><span>${opt}</span>`;

    if (answered) {
      btn.classList.add('disabled');
      if (i === q.answer) btn.classList.add('show-correct');
      if (userAnswers[currentIdx] === i && i !== q.answer) btn.classList.add('wrong');
    } else {
      btn.onclick = () => selectAnswer(i);
    }
    div.appendChild(btn);
  });
  area.appendChild(div);

  // Feedback
  const fb = document.getElementById('feedbackBox');
  if (answered) {
    const correct = userAnswers[currentIdx] === q.answer;
    fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
    fb.innerHTML = (correct ? '✅ 정답입니다! ' : `❌ 오답입니다. 정답: <strong>${labels[q.answer]} ${q.opts[q.answer]}</strong><br>`) + q.explain;
    fb.style.display = 'block';
  } else {
    fb.style.display = 'none';
  }

  // Nav buttons
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  const nextBtn = document.getElementById('nextBtn');
  if (currentIdx === total - 1 && answered) {
    nextBtn.textContent = '결과 보기 🎉';
  } else {
    nextBtn.textContent = '다음 →';
  }
}

function selectAnswer(i) {
  if (answered) return;
  const q = currentQuestions[currentIdx];
  userAnswers[currentIdx] = i;
  answered = true;
  if (i === q.answer) {
    score++;
    document.getElementById('headerScore').textContent = score;
  }
  renderQuestion();

  // Auto-advance after 1.8s if not last
  if (currentIdx < currentQuestions.length - 1) {
    setTimeout(() => {
      if (answered && currentIdx < currentQuestions.length - 1) goNext();
    }, 1800);
  }
}

function goNext() {
  if (currentIdx < currentQuestions.length - 1) {
    currentIdx++;
    renderQuestion();
  } else if (answered) {
    showResult();
  }
}

function goPrev() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
  }
}

// ═══════════════════════════════════════════════════════
//  RESULT
// ═══════════════════════════════════════════════════════
function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);
  const wrong = total - score;

  document.getElementById('resultScore').textContent = pct + '점';
  document.getElementById('resultTotal').textContent = `총 ${total}문제 중 ${score}문제 정답`;
  document.getElementById('rCorrect').textContent = score;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rPct').textContent = pct + '%';

  let emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = '완벽합니다! 시험 준비 완료!'; }
  else if (pct >= 80) { emoji = '🎉'; msg = '훌륭해요! 조금만 더 복습하면 만점!'; }
  else if (pct >= 70) { emoji = '😊'; msg = '잘했어요! 틀린 문제를 다시 확인하세요.'; }
  else if (pct >= 60) { emoji = '📖'; msg = '합격권! 오답 복습이 필요합니다.'; }
  else { emoji = '💪'; msg = '더 많이 연습이 필요합니다. 파이팅!'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('headerScore').textContent = score;
}

function showReview() {
  const sec = document.getElementById('reviewSection');
  sec.innerHTML = '<h3 style="margin-bottom:16px;font-size:1.1rem;">📋 문제 복습</h3>';
  const labels = ['①', '②', '③', '④', '⑤'];

  currentQuestions.forEach((q, i) => {
    const ua = userAnswers[i];
    const correct = ua === q.answer;
    const item = document.createElement('div');
    item.className = `reviewItem ${correct ? 'reviewCorrect' : 'reviewWrong'}`;
    item.innerHTML = `
      <div class="revQ">${correct ? '✅' : '❌'} Q${i + 1}. ${q.q}</div>
      ${q.sub ? `<div style="font-size:.83rem;color:#64748b;margin-bottom:6px;font-style:italic">${q.sub}</div>` : ''}
      <div class="revA">
        ${correct
          ? `<span class="correct-ans">내 답: ${labels[ua]} ${q.opts[ua]}</span>`
          : `<span class="wrong-ans">내 답: ${ua !== null ? labels[ua] + ' ' + q.opts[ua] : '미응답'}</span> &nbsp;|&nbsp; <span class="correct-ans">정답: ${labels[q.answer]} ${q.opts[q.answer]}</span>`
        }<br>
        <span style="color:#475569;font-size:.82rem">💡 ${q.explain}</span>
      </div>`;
    sec.appendChild(item);
  });

  sec.scrollIntoView({ behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════
init();
</script>
</body>
</html>
